name: lexiai-local

# Local dev infra: Postgres + LocalStack (SQS + S3) + Jaeger (tracing).
# Bring up:   bun run --filter '@lexiai/infra' local:up
# Tear down:  bun run --filter '@lexiai/infra' local:down
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Dev DB only. Tests use a throwaway Testcontainers Postgres, not this one
      # (see @lexiai/database/testing) — no test DB is provisioned here.
      POSTGRES_DB: lexiai_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d lexiai_dev']
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    # Pinned to the last free community release. From v2026.3.0 (2026-03-23)
    # LocalStack merged community + pro into one image, so `:latest` now demands
    # a LOCALSTACK_AUTH_TOKEN and exits 55 ("License activation failed") without
    # one; the LS_ACKNOWLEDGE_ACCOUNT_REQUIREMENT escape hatch expired 2026-04-06.
    # 4.4.0 is the last pre-merge community image (SQS + S3, no token). Do not
    # float back to `:latest` without wiring an auth token.
    image: localstack/localstack:4.4.0
    environment:
      SERVICES: sqs,s3
      DEBUG: '0'
    ports:
      - '4566:4566'
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4566/_localstack/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 15

  # Jaeger all-in-one: receives OTLP spans from apps/{api,worker} and serves the
  # trace UI. In-memory storage (traces reset on restart) — local dev only.
  # Spans target http://localhost:4318 by default (see @lexiai/observability
  # TracingLive); browse traces at http://localhost:16686.
  # No healthcheck: the image ships no in-container HTTP client, so `--wait`
  # treats this service as ready once it is running.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686' # Jaeger UI
      - '4318:4318' # OTLP/HTTP ingest (matches TracingLive default)

volumes:
  postgres-data:
  localstack-data:
